        <use xlink:href="#star" x="24"  y="72"/><use xlink:href="#star" x="60"  y="72"/><use xlink:href="#star" x="96"  y="72"/><use xlink:href="#star" x="132" y="72"/><use xlink:href="#star" x="168" y="72"/>
        <use xlink:href="#star" x="42"  y="97"/><use xlink:href="#star" x="78"  y="97"/><use xlink:href="#star" x="114" y="97"/><use xlink:href="#star" x="150" y="97"/>
