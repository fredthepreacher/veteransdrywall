    <line x1="363" y1="112" x2="920" y2="112" stroke="#3A3F47" stroke-width="2"/>
    <text x="363" y="140" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="3" fill="#9AA1AB">USMC VETERAN OWNED &#38; OPERATED</text>
