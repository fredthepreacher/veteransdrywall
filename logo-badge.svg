<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560" role="img" aria-label="Veteran Drywall LLC badge">
  <!-- ============ STACKED BADGE — shirt-style / social avatar / flyer ============
       Distressed flag disc, kneeling soldier + battlefield cross, JOHN 15:13 banner,
       phone + license + services. Colors: #15181D / #D9A62E–#E8BC55 / #F5F2EA -->
  <defs>
    <clipPath id="bdisc"><circle cx="210" cy="190" r="126"/></clipPath>
    <linearGradient id="bgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8BC55"/><stop offset="1" stop-color="#D9A62E"/>
    </linearGradient>
    <path id="arcTop" d="M210 62a128 128 0 0 1 128 128" fill="none"/>
    <path id="arcTopL" d="M82 190a128 128 0 0 1 128-128" fill="none"/>
  </defs>

  <rect width="420" height="560" rx="18" fill="#15181D"/>
  <rect x="10" y="10" width="400" height="540" rx="12" fill="none" stroke="url(#bgold)" stroke-width="2" opacity=".6"/>

  <!-- Arched company name -->
  <text font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="#F5F2EA">
    <textPath href="#arcTopL" startOffset="8%">VETERAN</textPath>
  </text>
  <text font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="url(#bgold)">
    <textPath href="#arcTop" startOffset="14%">DRYWALL</textPath>
  </text>

  <!-- Emblem disc -->
  <circle cx="210" cy="190" r="130" fill="#0C0E12"/>
  <circle cx="210" cy="190" r="126" fill="none" stroke="url(#bgold)" stroke-width="4"/>
  <g clip-path="url(#bdisc)">
    <!-- distressed flag stripes -->
    <g fill="#F5F2EA" opacity=".13">
      <path d="M84 104h224l-13 5-17-3-21 6-26-5-23 5-19-3-15 3H84z"/>
      <path d="M84 138h238l-19 5-24-3-17 5-28-5-21 5-24-3-17 3H84z"/>
      <path d="M84 172h250l-15 5-23-3-19 5-30-5-19 5-26-3-15 3H84z"/>
      <path d="M84 206h246l-17 5-21-3-22 6-25-5-22 4-21-3-17 3H84z"/>
      <path d="M84 240h234l-15 5-24-5-17 5-26-3-23 5-19-3-15 2H84z"/>
      <path d="M84 274h216l-13 5-19-3-22 5-25-5-20 4-17-2H84z"/>
    </g>
    <g fill="#F5F2EA" opacity=".2">
      <circle cx="112" cy="96" r="2.6"/><circle cx="134" cy="106" r="2.6"/><circle cx="156" cy="96" r="2.6"/>
      <circle cx="122" cy="120" r="2.6"/><circle cx="146" cy="128" r="2.6"/><circle cx="108" cy="140" r="2.6"/>
      <circle cx="168" cy="118" r="2.6"/>
    </g>
    <!-- ground -->
    <path d="M84 268q42-11 84-8t88 4q26-2 46 4l12 4v46H84z" fill="#080A0D"/>
    <!-- battlefield cross -->
    <g fill="#F5F2EA">
      <path d="M232 250h13l4 15h11q6 0 6 6v2h-37l2-17z"/>
      <path d="M255 250h13l4 15h9q6 0 6 6v2h-35l2-17z"/>
      <rect x="249" y="145" width="8" height="108" rx="3"/>
      <path d="M243 122l19-4 4 11-8 19h-11l-8-15z"/>
      <path d="M257 202l15 8-4 11-15-6z"/>
      <path d="M232 115a21 15 0 0 1 42 0l2 6h-46z"/>
      <path d="M249 152l-9 15 2 8 5-2 6-17z" opacity=".9"/>
    </g>
    <!-- kneeling soldier -->
    <g fill="#F5F2EA">
      <path d="M138 156a14 11 0 0 1 26 4l-2 5h-24z"/>
      <path d="M134 172q15-4 26 4l11 15-5 30-15 8-11-4-11-26z"/>
      <path d="M156 187l23 15-4 9-22-11z"/>
      <path d="M143 220l26 4 4 15-11 6-19-4-7-13z"/>
      <path d="M165 239l8 15h11l2 9h-27l-6-20z"/>
      <path d="M128 224l8 22-15 11-11-2 4-11 7-6z"/>
    </g>
  </g>

  <!-- JOHN 15:13 banner -->
  <g>
    <path d="M96 330l114-14 114 14-10 30-104-12-104 12z" fill="url(#bgold)"/>
    <text x="210" y="342" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="24" font-weight="700" letter-spacing="5" fill="#15181D">JOHN 15:13</text>
  </g>

  <!-- Services -->
  <text x="210" y="398" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="21" font-weight="600" letter-spacing="3.5" fill="#F5F2EA">DRYWALL · TEXTURE · STUCCO</text>
  <text x="210" y="426" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="21" font-weight="600" letter-spacing="3.5" fill="#F5F2EA">PAINT · FRAMING · TRIM</text>

  <rect x="120" y="444" width="180" height="2" fill="#D9A62E" opacity=".7"/>

  <!-- Phone -->
  <text x="210" y="486" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="url(#bgold)">(941) 527-5924</text>
  <!-- License -->
  <text x="210" y="518" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="16" font-weight="500" letter-spacing="3" fill="#F5F2EA" opacity=".8">LICENSED &amp; INSURED · LIC # SCC131152687</text>
  <text x="210" y="540" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="15" font-weight="500" letter-spacing="3" fill="#D9A62E">NORTH PORT, FL · VETERAN OWNED &amp; OPERATED</text>
</svg>
