<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Veteran Drywall LLC emblem — kneeling soldier battlefield cross, John 15:13">
<defs>
  <radialGradient id="bgFade" cx="50%" cy="42%" r="65%">
    <stop offset="0%" stop-color="#20242C"/>
    <stop offset="100%" stop-color="#0C0E12"/>
  </radialGradient>
  <linearGradient id="goldFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E8BC55"/>
    <stop offset="100%" stop-color="#D9A62E"/>
  </linearGradient>
  <path id="arcTop" d="M 66,214 A 148,148 0 1 1 334,214"/>
  <clipPath id="circleClip"><circle cx="200" cy="200" r="182"/></clipPath>
</defs>

<!-- outer rings -->
<circle cx="200" cy="200" r="196" fill="#0C0E12" stroke="url(#goldFade)" stroke-width="5"/>
<circle cx="200" cy="200" r="182" fill="url(#bgFade)" stroke="#D9A62E" stroke-width="1.5"/>

<!-- distressed flag sash, clipped inside badge, low opacity -->
<g clip-path="url(#circleClip)" opacity="0.14">
  <g transform="rotate(-24 200 200)">
    <rect x="-40" y="120" width="480" height="18" fill="#E8BC55"/>
    <rect x="-40" y="150" width="480" height="18" fill="#F5F2EA"/>
    <rect x="-40" y="180" width="480" height="18" fill="#E8BC55"/>
    <rect x="-40" y="210" width="480" height="18" fill="#F5F2EA"/>
    <rect x="-40" y="240" width="480" height="18" fill="#E8BC55"/>
    <polygon points="-40,120 60,120 44,138 -40,138" fill="#0C0E12"/>
    <polygon points="440,258 320,258 336,240 440,240" fill="#0C0E12"/>
  </g>
</g>

<!-- scattered stars, top field -->
<g fill="#E8BC55" opacity="0.9">
  <path transform="translate(148,86) scale(0.9)" d="M6 0 L7.8 4.2 L12 4.6 L8.8 7.4 L9.8 11.6 L6 9.2 L2.2 11.6 L3.2 7.4 L0 4.6 L4.2 4.2 Z"/>
  <path transform="translate(200,74) scale(1.05)" d="M6 0 L7.8 4.2 L12 4.6 L8.8 7.4 L9.8 11.6 L6 9.2 L2.2 11.6 L3.2 7.4 L0 4.6 L4.2 4.2 Z"/>
  <path transform="translate(252,86) scale(0.9)" d="M6 0 L7.8 4.2 L12 4.6 L8.8 7.4 L9.8 11.6 L6 9.2 L2.2 11.6 L3.2 7.4 L0 4.6 L4.2 4.2 Z"/>
</g>

<!-- arc wordmark -->
<text font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-weight="700" font-size="30" letter-spacing="5" fill="#E8BC55">
  <textPath href="#arcTop" startOffset="50%" text-anchor="middle">VETERAN DRYWALL</textPath>
</text>

<!-- ground line -->
<rect x="118" y="308" width="164" height="4" rx="2" fill="#D9A62E" opacity="0.55"/>

<!-- battlefield cross: rifle, bayonet, cross-guard, dog tags, helmet -->
<g fill="url(#goldFade)">
  <polygon points="201,158 209,158 213,178 197,178"/>
  <rect x="200" y="176" width="9" height="130" rx="2"/>
  <rect x="188" y="204" width="34" height="7" rx="2"/>
  <circle cx="204.5" cy="220" r="4" opacity="0.9"/>
  <circle cx="204.5" cy="230" r="4" opacity="0.9"/>
  <path d="M204.5 224 L206.5 234 L202.5 234 Z" opacity="0.9"/>
  <ellipse cx="204.5" cy="168" rx="17" ry="11"/>
  <rect x="187" y="166" width="35" height="5" rx="2.5"/>
</g>

<!-- boots -->
<g fill="url(#goldFade)">
  <path d="M172,292 L196,292 L196,306 L166,306 C164,300 166,294 172,292 Z"/>
  <path d="M238,292 L214,292 L214,306 L244,306 C246,300 244,294 238,292 Z"/>
</g>

<!-- kneeling soldier silhouette (bowed head, one knee down) -->
<g fill="url(#goldFade)">
  <circle cx="151" cy="196" r="13"/>
  <path d="M144,206
           C130,212 122,228 123,248
           C124,266 130,284 138,300
           L168,300
           C170,278 168,252 160,232
           C156,222 152,212 144,206 Z"/>
  <path d="M120,262 C112,270 108,282 112,300 L134,300 C130,286 128,272 128,262 Z"/>
</g>

<!-- lower ribbon banner -->
<path d="M96,332 L304,332 L288,356 L200,368 L112,356 Z" fill="#0C0E12" stroke="#D9A62E" stroke-width="2"/>
<text x="200" y="352" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-weight="700" font-size="21" letter-spacing="2" fill="#E8BC55">JOHN 15:13</text>

<!-- small base text -->
<text x="200" y="392" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-weight="600" font-size="13" letter-spacing="3" fill="#F5F2EA" opacity="0.8">USMC VETERAN OWNED</text>
</svg>
