# Veteran Drywall — Netlify configuration
# Static site: no build step. Publish the repo root.

[build]
  publish = "."

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Redirect Netlify subdomain / www consistency is configured in the Netlify UI
# (Domain settings) after connecting veterandrywall.net.

