<style>
:root{--ink:#15181D;--gold:#D9A62E;--gold-2:#E8BC55;--paper:#F5F2EA}
*{margin:0;padding:0;box-sizing:border-box}

p{margin:16px 0 28px;color:rgba(245,242,234,.85)}
.btn{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;padding:15px 30px;border-radius:8px;margin:6px}

.btn-ghost{color:var(--paper);border:2px solid rgba(245,242,234,.4)}
.btn-ghost:hover{border-color:var(--gold-2);color:var(--gold-2)}
